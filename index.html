  <script>
// PWA Service Worker untuk offline & installasi
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register(new URL('data:application/javascript;base64,c2VsZi5hZGRFdmVudExpc3RlbmVyKCdpbnN0YWxsJywgZXZlbnQgPT4gc2VsZi5za2lwV2FpdGluZygpKTtzZWxmLmFkZEV2ZW50TGlzdGVuZXIoJ2FjdGl2YXRlJywgZXZlbnQgPT4gc2VsZi5jbGllbnRzLmNsYWltKCkpO3NlbGYuYWRkRXZlbnRMaXN0ZW5lcignZmV0Y2gnLCBldmVudCA9PiBldmVudC5yZXNwb25kV2l0aChmZXRjaChldmVudC5yZXF1ZXN0KS5jYXRjaCgoKSA9PiBuZXcgUmVzcG9uc2UoJ1tPZmZsaW5lXScpKSkpOw==', {type: 'application/javascript'})).catch(e => console.log('SW registration failed:', e));
}

// ---- STATE ----
let transactions = JSON.parse(localStorage.getItem('catatkas_txns') || '[]');
let deleteTargetId = null;
let currentPage = 'dashboard';

// ---- HELPERS ----
function save() { localStorage.setItem('catatkas_txns', JSON.stringify(transactions)); }
function genId() { return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }
function fmtMoney(n) { return 'Rp ' + Math.abs(n).toLocaleString('id-ID'); }
function fmtDate(d) { const dt=new Date(d); return dt.toLocaleDateString('id-ID',{day:'numeric',month:'short',year:'numeric'}); }

function formatAmountInput(el) {
  let v = el.value.replace(/\D/g,'');
  if(v) { el.value = parseInt(v).toLocaleString('id-ID'); } else { el.value=''; }
}

function parseAmount(s) { return parseInt(s.replace(/\D/g,'')) || 0; }

function showToast(msg, type='success') {
  const c = document.getElementById('toastContainer');
  const t = document.createElement('div');
  const bg = type==='success' ? 'bg-emerald-500' : type==='error' ? 'bg-rose-500' : 'bg-sky-500';
  t.className = `toast ${bg} text-white text-sm font-600 px-4 py-2.5 rounded-xl shadow-lg pointer-events-auto`;
  t.textContent = msg;
  c.appendChild(t);
  setTimeout(()=>t.remove(), 2600);
}

// ---- NAVIGATION ----
function switchPage(page) {
  currentPage = page;
  document.querySelectorAll('.page-content').forEach(p=>p.classList.add('hidden'));
  document.getElementById('page-'+page).classList.remove('hidden');
  document.querySelectorAll('.bottom-nav-item').forEach(b=>{
    b.classList.toggle('active', b.dataset.page===page);
    b.classList.toggle('text-slate-500', b.dataset.page!==page);
  });
  if(page==='dashboard') renderDashboard();
  if(page==='history') { populateFilterMonth(); renderHistory(); }
  if(page==='report') populateReportSelectors();
}

// ---- DASHBOARD ----
function renderDashboard() {
  const income = transactions.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
  const expense = transactions.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
  const balance = income - expense;
  document.getElementById('balanceDisplay').textContent = (balance<0?'- ':'')+fmtMoney(balance);
  document.getElementById('totalIncome').textContent = fmtMoney(income);
  document.getElementById('totalExpense').textContent = fmtMoney(expense);

  const recent = [...transactions].sort((a,b)=>new Date(b.date)-new Date(a.date)).slice(0,5);
  const list = document.getElementById('recentList');
  if(!recent.length) { list.innerHTML='<p class="text-slate-500 text-sm text-center py-8">Belum ada transaksi</p>'; return; }
  list.innerHTML = recent.map(t=>txnCard(t)).join('');
}

function txnCard(t) {
  const isIncome = t.type==='income';
  const iconBg = isIncome ? 'bg-emerald-500/15' : 'bg-rose-500/15';
  const iconColor = isIncome ? '#34d399' : '#fb7185';
  const iconSvg = isIncome ? '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:18px;height:18px;color:'+iconColor+'"><path d="M12 5v14M5 12h14"/></svg>' : '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:18px;height:18px;color:'+iconColor+'"><path d="M5 12h14"/></svg>';
  const amtColor = isIncome ? 'text-emerald-400' : 'text-rose-400';
  const sign = isIncome ? '+' : '-';
  return `<div class="txn-card bg-slate-800/50 border border-slate-700/40 rounded-xl p-3.5 flex items-center gap-3">
    <div class="w-10 h-10 rounded-full ${iconBg} flex items-center justify-center flex-shrink-0">
      ${iconSvg}
    </div>
    <div class="flex-1 min-w-0">
      <p class="text-sm font-600 truncate">${t.desc}</p>
      <p class="text-slate-500 text-[11px]">${fmtDate(t.date)}</p>
    </div>
    <div class="text-right flex-shrink-0">
      <p class="${amtColor} text-sm font-700 tabular-nums">${sign} ${fmtMoney(t.amount)}</p>
    </div>
    <button onclick="event.stopPropagation();showActions('${t.id}')" class="ml-1 text-slate-500 p-1">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:16px;height:16px"><circle cx="12" cy="5" r="1"/><circle cx="12" cy="12" r="1"/><circle cx="12" cy="19" r="1"/></svg>
    </button>
  </div>`;
}

function showActions(id) {
  const t = transactions.find(x=>x.id===id); if(!t) return;
  showAddForm(t.type, t);
}

// ---- SHEET MODAL ----
function showAddForm(type, editTxn=null) {
  document.getElementById('txnType').value = type;
  document.getElementById('txnId').value = editTxn ? editTxn.id : '';
  document.getElementById('sheetTitle').textContent = editTxn
    ? 'Edit '+(type==='income'?'Pemasukan':'Pengeluaran')
    : 'Tambah '+(type==='income'?'Pemasukan':'Pengeluaran');

  const today = new Date().toISOString().split('T')[0];
  document.getElementById('txnDate').value = editTxn ? editTxn.date : today;
  document.getElementById('txnAmount').value = editTxn ? editTxn.amount.toLocaleString('id-ID') : '';
  document.getElementById('txnDesc').value = editTxn ? editTxn.desc : '';
  
  const descInput = document.getElementById('txnDesc');
  descInput.placeholder = type === 'income' ? 'Contoh: Gaji bulanan' : 'Contoh: Bayar listrik';

  const btn = document.getElementById('submitBtn');
  btn.className = 'w-full active:scale-[0.98] transition-all rounded-xl py-3.5 font-600 text-sm ' +
    (type==='income' ? 'bg-emerald-500 hover:bg-emerald-600' : 'bg-rose-500 hover:bg-rose-600');

  if(editTxn) {
    btn.textContent = 'Simpan Perubahan';
    let delRow = document.getElementById('editDeleteRow');
    if(!delRow) {
      delRow = document.createElement('button');
      delRow.id = 'editDeleteRow';
      delRow.type = 'button';
      delRow.className = 'w-full mt-2 border border-rose-500/40 text-rose-400 rounded-xl py-2.5 text-sm font-600 active:scale-[0.98] transition-all';
      delRow.textContent = 'Hapus Transaksi';
      btn.parentNode.appendChild(delRow);
    }
    delRow.style.display = 'block';
    delRow.onclick = () => { closeSheet(); showDeleteConfirm(editTxn.id); };
  } else {
    btn.textContent = 'Simpan';
    const delRow = document.getElementById('editDeleteRow');
    if(delRow) delRow.style.display = 'none';
  }

  document.getElementById('sheetOverlay').classList.remove('hidden');
  setTimeout(()=> document.getElementById('sheetModal').classList.add('open'), 10);
}

function closeSheet() {
  document.getElementById('sheetModal').classList.remove('open');
  setTimeout(()=> document.getElementById('sheetOverlay').classList.add('hidden'), 350);
}

function handleSubmit(e) {
  e.preventDefault();
  const id = document.getElementById('txnId').value;
  const type = document.getElementById('txnType').value;
  const date = document.getElementById('txnDate').value;
  const amount = parseAmount(document.getElementById('txnAmount').value);
  const desc = document.getElementById('txnDesc').value.trim();

  if(!amount) { showToast('Jumlah tidak boleh 0','error'); return; }
  if(!desc) { showToast('Keterangan wajib diisi','error'); return; }

  if(id) {
    const idx = transactions.findIndex(t=>t.id===id);
    if(idx>-1) { transactions[idx] = {...transactions[idx], date, amount, desc, type}; }
    showToast('Transaksi diperbarui');
  } else {
    transactions.push({ id:genId(), type, date, amount, desc });
    showToast(type==='income'?'Pemasukan ditambahkan':'Pengeluaran ditambahkan');
  }
  save();
  closeSheet();
  if(currentPage==='dashboard') renderDashboard();
  if(currentPage==='history') renderHistory();
}

// ---- DELETE ----
function showDeleteConfirm(id) {
  deleteTargetId = id;
  document.getElementById('deleteOverlay').classList.remove('hidden');
}
function closeDelete() { document.getElementById('deleteOverlay').classList.add('hidden'); deleteTargetId=null; }
function confirmDelete() {
  transactions = transactions.filter(t=>t.id!==deleteTargetId);
  save(); closeDelete();
  showToast('Transaksi dihapus');
  if(currentPage==='dashboard') renderDashboard();
  if(currentPage==='history') renderHistory();
}

// ---- HISTORY ----
function populateFilterMonth() {
  const sel = document.getElementById('filterMonth');
  const months = new Set();
  transactions.forEach(t => {
    const d = new Date(t.date);
    months.add(d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0'));
  });
  const sorted = [...months].sort().reverse();
  sel.innerHTML = '<option value="all">Semua Bulan</option>' +
    sorted.map(m => {
      const [y,mo] = m.split('-');
      const label = new Date(y,mo-1).toLocaleDateString('id-ID',{month:'long',year:'numeric'});
      return `<option value="${m}">${label}</option>`;
    }).join('');
}

function renderHistory() {
  const mFilter = document.getElementById('filterMonth').value;
  const tFilter = document.getElementById('filterType').value;
  let filtered = [...transactions];
  if(mFilter!=='all') {
    filtered = filtered.filter(t=>{
      const d=new Date(t.date);
      return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')===mFilter;
    });
  }
  if(tFilter!=='all') filtered = filtered.filter(t=>t.type===tFilter);
  filtered.sort((a,b)=>new Date(b.date)-new Date(a.date));

  const list = document.getElementById('historyList');
  if(!filtered.length) { list.innerHTML='<p class="text-slate-500 text-sm text-center py-8">Tidak ada transaksi</p>'; return; }
  list.innerHTML = filtered.map(t=>txnCard(t)).join('');
}

// ---- REPORT ----
function populateReportSelectors() {
  const mSel = document.getElementById('reportMonth');
  const ySel = document.getElementById('reportYear');
  const now = new Date();
  const monthNames = ['Januari','Februari','Maret','April','Mei','Juni','Juli','Agustus','September','Oktober','November','Desember'];
  mSel.innerHTML = monthNames.map((m,i)=>`<option value="${i}" ${i===now.getMonth()?'selected':''}>${m}</option>`).join('');
  const years = new Set([now.getFullYear()]);
  transactions.forEach(t=>years.add(new Date(t.date).getFullYear()));
  const sortedY = [...years].sort((a,b)=>b-a);
  ySel.innerHTML = sortedY.map(y=>`<option value="${y}" ${y===now.getFullYear()?'selected':''}>${y}</option>`).join('');
}

function generatePDF() {
  const month = parseInt(document.getElementById('reportMonth').value);
  const year = parseInt(document.getElementById('reportYear').value);
  const monthNames = ['Januari','Februari','Maret','April','Mei','Juni','Juli','Agustus','September','Oktober','November','Desember'];

  const filtered = transactions.filter(t=>{
    const d=new Date(t.date); return d.getMonth()===month && d.getFullYear()===year;
  }).sort((a,b)=>new Date(a.date)-new Date(b.date));

  // Calc opening balance: all txns before this month
  const beforeTxns = transactions.filter(t=>{
    const d=new Date(t.date); return d < new Date(year, month, 1);
  });
  let openBal = 0;
  beforeTxns.forEach(t=>{ openBal += t.type==='income'? t.amount : -t.amount; });

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF('p','mm','a4');

  // Header
  doc.setFillColor(15,23,42);
  doc.rect(0,0,210,40,'F');
  doc.setTextColor(255,255,255);
  doc.setFontSize(18);
  doc.text('Catat Kas - Rekap Transaksi', 15, 18);
  doc.setFontSize(11);
  doc.text(`${monthNames[month]} ${year}`, 15, 28);
  doc.setFontSize(9);
  doc.text(`Saldo Awal Bulan: Rp ${openBal.toLocaleString('id-ID')}`, 15, 35);

  // Table
  let runBal = openBal;
  const rows = filtered.map(t => {
    runBal += t.type==='income' ? t.amount : -t.amount;
    return [
      fmtDate(t.date),
      t.desc,
      t.type==='income' ? 'Rp '+t.amount.toLocaleString('id-ID') : '',
      t.type==='expense' ? 'Rp '+t.amount.toLocaleString('id-ID') : '',
      'Rp '+runBal.toLocaleString('id-ID')
    ];
  });

  if(!rows.length) {
    doc.setTextColor(100,116,139);
    doc.setFontSize(12);
    doc.text('Tidak ada transaksi di bulan ini.', 105, 60, {align:'center'});
  } else {
    doc.autoTable({
      startY: 45,
      head: [['Tanggal','Keterangan','Pemasukan','Pengeluaran','Saldo']],
      body: rows,
      theme: 'grid',
      headStyles: { fillColor:[15,23,42], textColor:[255,255,255], fontSize:9, fontStyle:'bold' },
      bodyStyles: { fontSize:8.5, textColor:[30,41,59] },
      alternateRowStyles: { fillColor:[241,245,249] },
      columnStyles: {
        2: { textColor:[5,150,105], fontStyle:'bold' },
        3: { textColor:[225,29,72], fontStyle:'bold' },
        4: { fontStyle:'bold' }
      },
      margin: { left:15, right:15 }
    });
  }

  // Summary
  const totalIn = filtered.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
  const totalOut = filtered.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
  const finalY = doc.lastAutoTable ? doc.lastAutoTable.finalY + 10 : 70;
  doc.setFillColor(248,250,252);
  doc.roundedRect(15, finalY, 180, 28, 3, 3, 'F');
  doc.setFontSize(9);
  doc.setTextColor(100,116,139);
  doc.text('Total Pemasukan:', 20, finalY+9);
  doc.text('Total Pengeluaran:', 20, finalY+17);
  doc.text('Saldo Akhir Bulan:', 20, finalY+25);
  doc.setTextColor(5,150,105);
  doc.text('Rp '+totalIn.toLocaleString('id-ID'), 80, finalY+9);
  doc.setTextColor(225,29,72);
  doc.text('Rp '+totalOut.toLocaleString('id-ID'), 80, finalY+17);
  doc.setTextColor(15,23,42);
  doc.setFontSize(10);
  doc.text('Rp '+runBal.toLocaleString('id-ID'), 80, finalY+25);

  doc.save(`CatatKas_${monthNames[month]}_${year}.pdf`);
  showToast('PDF berhasil diunduh! 📄');
}

  const title = config.app_title || defaultConfig.app_title;
  const el = document.getElementById('appTitle');
  if(el) el.textContent = title;
  document.title = title;

  const bg = config.background_color || defaultConfig.background_color;
  const surface = config.surface_color || defaultConfig.surface_color;
  const txt = config.text_color || defaultConfig.text_color;
  const font = config.font_family || defaultConfig.font_family;
  const size = config.font_size || defaultConfig.font_size;

  document.body.style.backgroundColor = bg;
  document.body.style.color = txt;
  document.body.style.fontFamily = `${font}, sans-serif`;
  document.body.style.fontSize = size + 'px';
}

    ],

    fontSizeable: { get:()=>config.font_size||defaultConfig.font_size, set:(v)=>{config.font_size=v;window.elementSdk.setConfig({font_size:v})} }
  }),
  mapToEditPanelValues: (config) => new Map([
    ['app_title', config.app_title || defaultConfig.app_title]
  ])
});
